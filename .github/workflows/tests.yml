name: Tests

on:
  pull_request:
    paths:
      - '**.py'
      - '**.ipynb'

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]
        os: [ ubuntu-latest ]
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Micromamba Python ${{ matrix.python-version }}
      uses: mamba-org/setup-micromamba@v3
      with:
        environment-name: TEST
        init-shell: bash
        create-args: >-
          python=${{ matrix.python-version }} --file requirements-dev.txt --channel conda-forge

    - name: Install rstcloth (PyPI-only)
      run: |
        micromamba run pip install rstcloth

    - name: Install glidertest
      run: |
        python -m pip install -e . --no-deps --force-reinstall

    - name: Full Tests
      run: |
        python -m pytest -v --cov=glidertest --cov-report term-missing tests/
